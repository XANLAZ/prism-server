# TURN/STUN relay for global voice/video calls (P2P fails behind NAT).
# Kept SEPARATE from the core stack on purpose: publishing the large UDP media
# range can be slow or fail on Docker Desktop (Windows/Mac), and that must
# never block the main server (gnetway/session/...) from starting.
#
# Config lives in coturn/turnserver.conf, rendered by start-server from
# coturn/turnserver.conf.template with the public IP + TURN secret. Using a
# config file (instead of a long command line) avoids arg-parsing breakage and
# makes external-ip reliably applied.
services:
  coturn:
    image: coturn/coturn:latest
    restart: always
    command: ["-c", "/etc/coturn/turnserver.conf"]
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49160-49200:49160-49200/udp"
